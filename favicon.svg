<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="HyperTunnel">
  <title>HyperTunnel</title>
  <defs>
    <linearGradient id="ht-tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f79149"/><stop offset="1" stop-color="#e15f12"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#ht-tile)"/>
  <!-- tunnel: concentric rings receding to a bright centre -->
  <g fill="none" stroke="#ffffff" stroke-width="34">
    <rect x="112" y="112" width="288" height="288" rx="78"/>
    <rect x="180" y="180" width="152" height="152" rx="42" opacity="0.8"/>
  </g>
  <rect x="232" y="232" width="48" height="48" rx="16" fill="#ffffff"/>
</svg>
